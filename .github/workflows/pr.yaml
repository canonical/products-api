name: PR checks

on: pull_request

env:
  SECRET_KEY: insecure_test_key

jobs:
  run-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag products.ubuntu.com .

      - name: Run image
        run: |
          docker run -d -p 80:80 --env SECRET_KEY=insecure_secret_key products.ubuntu.com

      - name: Test image
        run: |
          sleep 1 && curl --head --fail --retry-delay 5 --retry 10  --retry-connrefused http://localhost

  run-serve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node dependencies
        run: yarn install

      - name: Python dependencies
        run: |
          sudo apt-get update && sudo apt-get install --yes python3-setuptools
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Run serve
        timeout-minutes: 2
        run: |
          timeout 120 bash -c './entrypoint 0.0.0.0:${PORT}' &
          sleep 3 && curl --head --fail --retry-delay 5 --retry 10 --retry-connrefused http://localhost:8040

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node dependencies
        run: yarn install

      - name: Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          sudo pip3 install flake8 black

      - name: Lint python
        run: yarn run lint-python
