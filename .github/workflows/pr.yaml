name: PR checks

on: pull_request

env:
  SECRET_KEY: insecure_test_key

jobs:
  run-image:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: products_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag products.ubuntu.com .

      - name: Run image
        run: |
          docker run -d --network host --env PORT=8040 --env SECRET_KEY=insecure_secret_key --env DATABASE_URL=postgresql://postgres:pw@localhost:5432/products_db products.ubuntu.com

      - name: Test image
        run: |
          sleep 3 && curl --head --fail --retry-delay 3 --retry 5 --retry-connrefused http://localhost:8040/v1/health

      - name: Check container logs
        if: failure()
        run: |
          docker logs $(docker ps -aq | head -1)

  run-dotrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dotrun
        run: sudo pip3 install dotrun requests==2.31.0

      - name: Install dependencies
        run: |
          sudo chmod -R 777 .
          dotrun install

      - name: Run dotrun
        timeout-minutes: 2
        run: |
          dotrun &
          sleep 3 && curl --head --fail --retry-delay 5 --retry 10 --retry-connrefused http://localhost:8040/v1/health

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node dependencies
        run: yarn install

      - name: Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          sudo pip3 install flake8 black==25.1.0

      - name: Lint python
        run: yarn run lint-python
